# Ensures metadata **Status** and **Last updated** match the latest §10 Revision History row.
name: SASE-DESIGN revision sync

on:
  push:
    paths:
      - "SASE-DESIGN.md"
      - "scripts/check-sase-design-revision-sync.py"
      - ".github/workflows/sase-design-revision-sync.yml"
  pull_request:
    paths:
      - "SASE-DESIGN.md"
      - "scripts/check-sase-design-revision-sync.py"
      - ".github/workflows/sase-design-revision-sync.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify header matches latest revision row
        run: python scripts/check-sase-design-revision-sync.py
